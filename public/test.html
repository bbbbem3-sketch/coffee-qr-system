cat > public/test.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luban Coffee - QR Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 40px; margin-bottom: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: white; margin-bottom: 30px; font-size: 2.5rem; }
        h2 { color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 14px 30px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; }
        .result { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 16px; display: none; text-align: center; }
        .result.show { display: block; }
        .qr-preview img { max-width: 200px; border: 1px solid #ddd; border-radius: 12px; padding: 10px; background: white; }
        .code-info { font-family: monospace; background: #e9ecef; padding: 10px; border-radius: 8px; margin: 10px 0; word-break: break-all; }
        .preset-colors { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .preset-btn { background: #f0f0f0; border: 1px solid #ddd; padding: 8px 16px; border-radius: 25px; cursor: pointer; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        .btn-secondary { background: #f0f0f0; color: #333; padding: 10px 20px; border-radius: 25px; cursor: pointer; border: none; width: auto; }
        .code-item { background: #f8f9fa; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 15px; text-align: center; }
        .stat-number { font-size: 2rem; font-weight: bold; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } h1 { font-size: 1.8rem; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>☕ Luban Coffee - QR Generator</h1>
        
        <!-- Generate Tab -->
        <div class="card">
            <h2>✨ Generate QR Code</h2>
            <div class="form-group">
                <label>Destination URL</label>
                <input type="url" id="dest-url" value="https://dynamic-qr-system-xi.vercel.app/luban-coffee.html">
            </div>
            <div class="form-group">
                <label>Short Code (optional)</label>
                <input type="text" id="short-code" placeholder="luban001">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>QR Dark Color</label>
                    <input type="color" id="qr-dark" value="#4A2C1A">
                </div>
                <div class="form-group">
                    <label>QR Light Color</label>
                    <input type="color" id="qr-light" value="#F5E6D3">
                </div>
            </div>
            <div class="preset-colors">
                <button class="preset-btn" data-dark="#4A2C1A" data-light="#F5E6D3">☕ Coffee Brown</button>
                <button class="preset-btn" data-dark="#000000" data-light="#FFFFFF">⚫ Black & White</button>
                <button class="preset-btn" data-dark="#2E7D32" data-light="#FFFFFF">🌿 Forest Green</button>
            </div>
            <button onclick="generateQR()">🚀 Generate QR Code</button>
            <div id="result" class="result">
                <div id="qr-result"></div>
                <div class="btn-group">
                    <button class="btn-secondary" onclick="downloadQR()">📥 Download QR</button>
                    <button class="btn-secondary" onclick="copyUrl()">📋 Copy URL</button>
                </div>
            </div>
        </div>
        
        <!-- Manage Tab -->
        <div class="card">
            <h2>📋 Manage QR Codes</h2>
            <button class="btn-secondary" onclick="loadCodes()" style="width: auto; margin-bottom: 15px;">🔄 Refresh</button>
            <div id="codes-list">Loading...</div>
        </div>
        
        <!-- Stats Tab -->
        <div class="card">
            <h2>📊 Statistics</h2>
            <select id="stats-select" onchange="loadStats()" style="margin-bottom: 15px;">
                <option>-- Select a code --</option>
            </select>
            <div id="stats-content"></div>
        </div>
    </div>
    
    <script>
        const baseUrl = window.location.origin;
        let currentQR = null;
        
        async function generateQR() {
            const destinationUrl = document.getElementById('dest-url').value;
            const shortCode = document.getElementById('short-code').value;
            const qrDark = document.getElementById('qr-dark').value;
            const qrLight = document.getElementById('qr-light').value;
            
            if (!destinationUrl) {
                alert('Enter a destination URL');
                return;
            }
            
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Generating...';
            
            try {
                const response = await fetch(`${baseUrl}/api/qr/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        destinationUrl,
                        shortCode: shortCode || undefined,
                        qrDarkColor: qrDark,
                        qrLightColor: qrLight
                    })
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                currentQR = data;
                
                document.getElementById('qr-result').innerHTML = `
                    <div class="qr-preview"><img src="${data.qrImage}" alt="QR Code"></div>
                    <div class="code-info">
                        <strong>Short Code:</strong> ${data.shortCode}<br>
                        <strong>Destination:</strong> ${data.destinationUrl}
                    </div>
                `;
                document.getElementById('result').classList.add('show');
                
                loadCodes();
                loadStatsSelect();
                
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Generate QR Code';
            }
        }
        
        function downloadQR() {
            if (currentQR?.qrImage) {
                const link = document.createElement('a');
                link.download = `${currentQR.shortCode}.png`;
                link.href = currentQR.qrImage;
                link.click();
            }
        }
        
        function copyUrl() {
            if (currentQR?.destinationUrl) {
                navigator.clipboard.writeText(currentQR.destinationUrl);
                alert('URL copied!');
            }
        }
        
        async function loadCodes() {
            try {
                const response = await fetch(`${baseUrl}/api/qr/list`);
                const data = await response.json();
                
                if (!data.codes || data.codes.length === 0) {
                    document.getElementById('codes-list').innerHTML = '<p>No QR codes yet. Generate some!</p>';
                    return;
                }
                
                let html = '';
                for (const code of data.codes) {
                    html += `
                        <div class="code-item">
                            <div>
                                <strong>${code.short_code}</strong><br>
                                <small>${code.destination_url}</small><br>
                                📊 ${code.scan_count} scans
                            </div>
                            <div style="margin-top: 10px;">
                                <input type="text" id="edit-${code.short_code}" placeholder="New URL" style="padding: 6px; width: 200px;">
                                <button onclick="updateCode('${code.short_code}')">Update</button>
                                <button onclick="deleteCode('${code.short_code}')" style="background:#dc3545;color:white;">Delete</button>
                            </div>
                        </div>
                    `;
                }
                document.getElementById('codes-list').innerHTML = html;
                loadStatsSelect();
                
            } catch (error) {
                document.getElementById('codes-list').innerHTML = '<p>Error loading codes</p>';
            }
        }
        
        async function updateCode(shortCode) {
            const newUrl = document.getElementById(`edit-${shortCode}`).value;
            if (!newUrl) {
                alert('Enter a new URL');
                return;
            }
            
            try {
                const response = await fetch(`${baseUrl}/api/qr/update/${shortCode}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ destinationUrl: newUrl })
                });
                
                if (response.ok) {
                    alert(`✅ Updated ${shortCode}`);
                    loadCodes();
                } else {
                    alert('Update failed');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function deleteCode(shortCode) {
            if (!confirm(`Delete ${shortCode}?`)) return;
            
            try {
                const response = await fetch(`${baseUrl}/api/qr/delete/${shortCode}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    alert(`✅ Deleted ${shortCode}`);
                    loadCodes();
                } else {
                    alert('Delete failed');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function loadStatsSelect() {
            try {
                const response = await fetch(`${baseUrl}/api/qr/list`);
                const data = await response.json();
                let html = '<option>-- Select a code --</option>';
                data.codes?.forEach(c => html += `<option value="${c.short_code}">${c.short_code} (${c.scan_count} scans)</option>`);
                document.getElementById('stats-select').innerHTML = html;
            } catch (error) {}
        }
        
        async function loadStats() {
            const shortCode = document.getElementById('stats-select').value;
            if (!shortCode || shortCode === '-- Select a code --') return;
            
            try {
                const response = await fetch(`${baseUrl}/api/qr/stats/${shortCode}`);
                const data = await response.json();
                document.getElementById('stats-content').innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number">${data.stats?.total_scans || 0}</div>
                            <div class="stat-label">Total Scans</div>
                        </div>
                    </div>
                `;
            } catch (error) {}
        }
        
        // Preset colors
        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('qr-dark').value = btn.getAttribute('data-dark');
                document.getElementById('qr-light').value = btn.getAttribute('data-light');
            });
        });
        
        // Initialize
        loadCodes();
        
        console.log('✅ Luban Coffee QR System Ready');
    </script>
</body>
</html>
EOF
