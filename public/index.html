<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional QR + Barcode Generator | Coffee Bag System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>☕ Professional QR + Barcode Generator</h1>
            <p>CMYK • RGB • HEX • Professional Print Production</p>
        </header>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('generate')">✨ Generate</button>
            <button class="tab-btn" onclick="showTab('batch')">📦 Batch</button>
            <button class="tab-btn" onclick="showTab('manage')">📋 Manage</button>
            <button class="tab-btn" onclick="showTab('stats')">📊 Stats</button>
        </div>
        
        <!-- Generate Tab -->
        <div id="generate-tab" class="tab-content active">
            <div class="card">
                <h2>Create Single QR Code + Barcode</h2>
                
                <div class="form-group">
                    <label>Destination URL *</label>
                    <input type="url" id="dest-url" placeholder="https://yourcoffee.com/promotion">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Short Code (optional)</label>
                        <input type="text" id="short-code" placeholder="COFFEE001">
                    </div>
                    <div class="form-group">
                        <label>Barcode Value (optional)</label>
                        <input type="text" id="barcode-value" placeholder="COFFEE-000001">
                    </div>
                </div>
                
                <!-- QR Colors -->
                <div class="color-section">
                    <h3>📱 QR Code Colors</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>QR Dark Color</label>
                            <input type="color" id="qr-dark" value="#4A2C1A">
                        </div>
                        <div class="form-group">
                            <label>QR Light Color</label>
                            <input type="color" id="qr-light" value="#F5E6D3">
                        </div>
                        <div class="form-group">
                            <label>Barcode Color</label>
                            <input type="color" id="barcode-color" value="#000000">
                        </div>
                    </div>
                </div>
                
                <div class="preset-colors">
                    <button type="button" class="preset-btn" data-dark="#000000" data-light="#FFFFFF" data-barcode="#000000">⚫ Black & White</button>
                    <button type="button" class="preset-btn" data-dark="#4A2C1A" data-light="#F5E6D3" data-barcode="#4A2C1A">☕ Coffee Brown</button>
                    <button type="button" class="preset-btn" data-dark="#2E7D32" data-light="#FFFFFF" data-barcode="#2E7D32">🌿 Forest Green</button>
                </div>
                
                <button class="btn-primary" onclick="generateSingle()">🚀 Generate</button>
            </div>
            
            <div id="result" class="result-card" style="display: none;">
                <h3>✅ Generated Successfully!</h3>
                <div id="result-content"></div>
                <div class="button-group">
                    <button class="btn-secondary" onclick="downloadQR()">📥 Download QR (PNG)</button>
                    <button class="btn-secondary" onclick="downloadBarcode()">📥 Download Barcode (PNG)</button>
                </div>
            </div>
        </div>
        
        <!-- Batch Tab -->
        <div id="batch-tab" class="tab-content">
            <div class="card">
                <h2>📦 Batch Generator</h2>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Prefix</label>
                        <input type="text" id="batch-prefix" value="COFFEE">
                    </div>
                    <div class="form-group">
                        <label>Start Number</label>
                        <input type="number" id="batch-start" value="1">
                    </div>
                    <div class="form-group">
                        <label>End Number</label>
                        <input type="number" id="batch-end" value="10">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Barcode Prefix</label>
                    <input type="text" id="batch-barcode-prefix" placeholder="COFFEE-">
                </div>
                
                <div class="color-section">
                    <h3>🎨 Batch Colors</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>QR Dark Color</label>
                            <input type="color" id="batch-qr-dark" value="#4A2C1A">
                        </div>
                        <div class="form-group">
                            <label>QR Light Color</label>
                            <input type="color" id="batch-qr-light" value="#F5E6D3">
                        </div>
                        <div class="form-group">
                            <label>Barcode Color</label>
                            <input type="color" id="batch-barcode-color" value="#000000">
                        </div>
                    </div>
                </div>
                
                <button class="btn-primary" onclick="generateBatch()">🚀 Generate Batch</button>
                
                <div id="batch-progress" style="display: none; margin-top: 20px;">
                    <div class="progress-bar"><div id="progress-fill" style="width: 0%; height: 8px; background: #28a745;"></div></div>
                    <p id="progress-text">Generating...</p>
                </div>
                
                <div id="batch-result" style="display: none;">
                    <a id="download-batch-zip" class="btn-primary">📥 Download All (ZIP)</a>
                </div>
            </div>
        </div>
        
        <!-- Manage Tab -->
        <div id="manage-tab" class="tab-content">
            <div class="card">
                <h2>📋 Manage QR Codes</h2>
                <div id="codes-list">Loading...</div>
            </div>
        </div>
        
        <!-- Stats Tab -->
        <div id="stats-tab" class="tab-content">
            <div class="card">
                <h2>📊 Scan Statistics</h2>
                <select id="stats-select" onchange="loadStats()">
                    <option>-- Select --</option>
                </select>
                <div id="stats-content"></div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
