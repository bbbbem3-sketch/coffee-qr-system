<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luban Coffee - QR & Barcode Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: white; margin-bottom: 30px; font-size: 2.5rem; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap; }
        .tab-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 12px 30px; border-radius: 30px; color: white; font-size: 16px; cursor: pointer; }
        .tab-btn.active { background: white; color: #1a1a2e; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; border-radius: 24px; padding: 30px; margin-bottom: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .card h2 { color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 14px 30px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; }
        .btn-secondary { background: #f0f0f0; color: #333; width: auto; padding: 8px 20px; margin: 5px; }
        .result { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 16px; display: none; text-align: center; }
        .result.show { display: block; }
        .preview img { max-width: 200px; border: 1px solid #ddd; border-radius: 12px; padding: 10px; background: white; margin: 10px; }
        .code-item { background: #f8f9fa; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .preset-colors { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .preset-btn { background: #f0f0f0; border: 1px solid #ddd; padding: 8px 16px; border-radius: 25px; cursor: pointer; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } h1 { font-size: 1.8rem; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>☕ Luban Coffee - QR & Barcode Generator</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('qr')">📱 QR Code</button>
            <button class="tab-btn" onclick="showTab('barcode')">📊 Barcode</button>
            <button class="tab-btn" onclick="showTab('manage')">📋 Manage</button>
        </div>
        
        <!-- QR Code Tab -->
        <div id="qr-tab" class="tab-content active">
            <div class="card">
                <h2>📱 Generate QR Code</h2>
                <div class="form-group">
                    <label>Destination URL</label>
                    <input type="url" id="qr-dest" value="https://dynamic-qr-system-xi.vercel.app/luban-coffee.html">
                </div>
                <div class="form-group">
                    <label>Short Code (optional)</label>
                    <input type="text" id="qr-code" placeholder="luban001">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Dark Color</label>
                        <input type="color" id="qr-dark" value="#4A2C1A">
                    </div>
                    <div class="form-group">
                        <label>Light Color</label>
                        <input type="color" id="qr-light" value="#F5E6D3">
                    </div>
                </div>
                <div class="preset-colors">
                    <button class="preset-btn" data-dark="#4A2C1A" data-light="#F5E6D3">☕ Coffee Brown</button>
                    <button class="preset-btn" data-dark="#000000" data-light="#FFFFFF">⚫ Black & White</button>
                    <button class="preset-btn" data-dark="#2E7D32" data-light="#FFFFFF">🌿 Forest Green</button>
                </div>
                <button onclick="generateQR()">🚀 Generate QR Code</button>
                <div id="qr-result" class="result"></div>
            </div>
        </div>
        
        <!-- Barcode Tab -->
        <div id="barcode-tab" class="tab-content">
            <div class="card">
                <h2>📊 Generate Barcode</h2>
                <div class="form-group">
                    <label>Barcode Value</label>
                    <input type="text" id="bar-value" placeholder="COFFEE-000001">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Barcode Type</label>
                        <select id="bar-type">
                            <option value="code128">Code 128 (Recommended)</option>
                            <option value="ean13">EAN-13 (Retail)</option>
                            <option value="upca">UPC-A (Retail)</option>
                            <option value="code39">Code 39</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Barcode Color</label>
                        <input type="color" id="bar-color" value="#000000">
                    </div>
                </div>
                <button onclick="generateBarcode()">🚀 Generate Barcode</button>
                <div id="barcode-result" class="result"></div>
            </div>
        </div>
        
        <!-- Manage Tab -->
        <div id="manage-tab" class="tab-content">
            <div class="card">
                <h2>📋 Manage Generated Codes</h2>
                <button class="btn-secondary" onclick="loadAllCodes()" style="margin-bottom: 15px;">🔄 Refresh</button>
                <div id="codes-list">Loading...</div>
            </div>
        </div>
    </div>
    
    <script>
        const baseUrl = window.location.origin;
        let currentQR = null;
        let currentBarcode = null;
        
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`${tabName}-tab`).classList.add('active');
            event.target.classList.add('active');
            if (tabName === 'manage') loadAllCodes();
        }
        
        // Preset colors
        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('qr-dark').value = btn.getAttribute('data-dark');
                document.getElementById('qr-light').value = btn.getAttribute('data-light');
            });
        });
        
        // Generate QR Code
        async function generateQR() {
            const destinationUrl = document.getElementById('qr-dest').value;
            const shortCode = document.getElementById('qr-code').value;
            const qrDark = document.getElementById('qr-dark').value;
            const qrLight = document.getElementById('qr-light').value;
            
            if (!destinationUrl) {
                alert('Enter destination URL');
                return;
            }
            
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Generating...';
            
            try {
                const response = await fetch(`${baseUrl}/api/qr/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        destinationUrl,
                        shortCode: shortCode || undefined,
                        qrDarkColor: qrDark,
                        qrLightColor: qrLight
                    })
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                currentQR = data;
                
                document.getElementById('qr-result').innerHTML = `
                    <div class="preview"><img src="${data.image}" alt="QR Code"></div>
                    <p><strong>Short Code:</strong> ${data.shortCode}</p>
                    <p><strong>Destination:</strong> ${data.destinationUrl}</p>
                    <button class="btn-secondary" onclick="downloadQR()">📥 Download QR Code</button>
                `;
                document.getElementById('qr-result').classList.add('show');
                
                loadAllCodes();
                
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Generate QR Code';
            }
        }
        
        function downloadQR() {
            if (currentQR?.image) {
                const link = document.createElement('a');
                link.download = `${currentQR.shortCode}.png`;
                link.href = currentQR.image;
                link.click();
            }
        }
        
        // Generate Barcode
        async function generateBarcode() {
            const value = document.getElementById('bar-value').value;
            const type = document.getElementById('bar-type').value;
            const color = document.getElementById('bar-color').value;
            
            if (!value) {
                alert('Enter barcode value');
                return;
            }
            
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Generating...';
            
            try {
                const response = await fetch(`${baseUrl}/api/barcode/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        value: value,
                        barcodeType: type,
                        barcodeColor: color
                    })
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                currentBarcode = data;
                
                document.getElementById('barcode-result').innerHTML = `
                    <div class="preview"><img src="${data.image}" alt="Barcode"></div>
                    <p><strong>Value:</strong> ${data.value}</p>
                    <p><strong>Type:</strong> ${type}</p>
                    <button class="btn-secondary" onclick="downloadBarcode()">📥 Download Barcode</button>
                `;
                document.getElementById('barcode-result').classList.add('show');
                
                loadAllCodes();
                
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Generate Barcode';
            }
        }
        
        function downloadBarcode() {
            if (currentBarcode?.image) {
                const link = document.createElement('a');
                link.download = `${currentBarcode.shortCode}.png`;
                link.href = currentBarcode.image;
                link.click();
            }
        }
        
        // Load all codes
        async function loadAllCodes() {
            try {
                const [qrRes, barRes] = await Promise.all([
                    fetch(`${baseUrl}/api/qr/list`),
                    fetch(`${baseUrl}/api/barcode/list`)
                ]);
                
                const qrData = await qrRes.json();
                const barData = await barRes.json();
                
                let html = '<h3>QR Codes</h3>';
                if (qrData.codes?.length) {
                    qrData.codes.forEach(code => {
                        html += `<div class="code-item">
                            <div><strong>📱 ${code.short_code}</strong><br><small>${code.destination_url}</small></div>
                            <button class="btn-secondary" onclick="deleteQR('${code.short_code}')">Delete</button>
                        </div>`;
                    });
                } else {
                    html += '<p>No QR codes yet</p>';
                }
                
                html += '<h3 style="margin-top: 20px;">📊 Barcodes</h3>';
                if (barData.codes?.length) {
                    barData.codes.forEach(code => {
                        html += `<div class="code-item">
                            <div><strong>📊 ${code.short_code}</strong><br><small>Value: ${code.value} | Type: ${code.type}</small></div>
                            <button class="btn-secondary" onclick="deleteBarcode('${code.short_code}')">Delete</button>
                        </div>`;
                    });
                } else {
                    html += '<p>No barcodes yet</p>';
                }
                
                document.getElementById('codes-list').innerHTML = html;
                
            } catch (error) {
                document.getElementById('codes-list').innerHTML = '<p>Error loading codes</p>';
            }
        }
        
        async function deleteQR(shortCode) {
            if (!confirm('Delete this QR code?')) return;
            try {
                await fetch(`${baseUrl}/api/qr/delete/${shortCode}`, { method: 'DELETE' });
                loadAllCodes();
            } catch (error) {
                alert('Error deleting');
            }
        }
        
        async function deleteBarcode(shortCode) {
            if (!confirm('Delete this barcode?')) return;
            try {
                await fetch(`${baseUrl}/api/barcode/delete/${shortCode}`, { method: 'DELETE' });
                loadAllCodes();
            } catch (error) {
                alert('Error deleting');
            }
        }
        
        // Initialize
        loadAllCodes();
        console.log('✅ QR & Barcode System Ready');
    </script>
</body>
</html>
